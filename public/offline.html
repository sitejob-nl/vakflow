<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#383eed" />
  <title>Vakflow — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: #383eed;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; color: #fff; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #383eed;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 0 1 .203 12.519l-.203.21-1.414-1.414a7 7 0 0 0-.158-9.737l.158-.164 1.414-1.414ZM15.536 8.464a5 5 0 0 1 .146 6.928l-.146.158-1.414-1.414a3 3 0 0 0-.12-4.114l.12-.144 1.414-1.414ZM2 12l4-4v3h6v2H6v3l-4-4Z"/>
      </svg>
    </div>
    <h1>Je bent offline</h1>
    <p>Controleer je internetverbinding en probeer opnieuw.</p>
    <button onclick="location.reload()">Opnieuw proberen</button>
  </div>
</body>
</html>
